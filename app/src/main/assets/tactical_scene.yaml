scene:
  background:
    color: '#010603'

cameras:
  tactical:
    type: perspective
    active: true

sources:
  osm:
    type: MVT
    url: https://tiles.openfreemap.org/planet/20260614_080001_pt/{z}/{x}/{y}.pbf
    max_zoom: 14

layers:
  water:
    data: { source: osm, layer: water }
    draw:
      polygons:
        order: 1
        color: '#002233'
  roads:
    data: { source: osm, layer: transportation }
    draw:
      lines:
        order: 20
        color: [0.0, 0.6, 0.3, 0.6]
        width: 1.5px
  buildings:
    data: { source: osm, layer: building }
    draw:
      polygons:
        order: 10
        color: [0.0, 1.0, 0.25, 0.15]
      lines:
        order: 11
        color: [0.0, 1.0, 0.25, 0.8]
        width: 1.0px
    extrude: true
